general:
    name: "onpremise"
    license:
      accept: true
      key: !file "/var/config/license.txt"
    url: "https://www.myidp.ibm.com"
    log_level: "debug"
    request_log:
      enabled: false
      format: ":date[iso] :method :url :http-version :status"
    enable_doc_cache: false
    tls:
      private_key: !file "/var/config/ivia-dc.key"
      public_key: !file "/var/config/ivia-dc.pem"
      ca_cert: !file "/var/config/ivia-ca.pem"
    wallet:
      name: "iviadc"
      encryption_key: "my-key"
    auth:
      jwt:
        header_name: my-jwt
        cert: !file "/var/config/ivia-dc.pem"
      dynamic_client_registration:
        endpoint: "https://www.myidp.ibm.com/oauth2"
        ca_cert: !file "/var/config/ivia-ca.pem"
        client_id: "admin"
        client_secret: "secret"
        cache_access_token: true
      introspection:
        cache:
          max_entries: 101
          max_age: 102
        providers:
        - name: "my-provider"
          endpoint: "https://www.myidp.ibm.com/oauth2"
          oid4vci:
            default_wallet_client_id: "default_oid4vci_wallet"
          claims:
          - name: "active"
            value: "true"
          type: remote
          remote:
            introspect_sub_path: "/introspect"
            client_id: "admin"
            client_secret: "secret"
    status_registry:
      min_statuslist_size: 131072
      max_statuslist_size: 131072
      max_random_allocation_attempts: 100
    oid4vci:
      nonce:
        private_key: !file "/var/config/oid4vci_nonce_private_key.pem"
database:
  postgresql:
    hosts:
    - 10.88.0.1
    port: 2024
    user: "iviadc"
    password: "secret"
    ssl: false
    skip_hostname_verify: true
    ca_cert: !file "/var/config/ivia-ca.pem"
  pool:
    min_connections: 5
    max_connections: 20
    max_idle_time: 10000
    connection_timeout: 10000
