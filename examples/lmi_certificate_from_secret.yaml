---
# Simple Example: Load LMI Management Certificate from Kubernetes Secret
#
# This example demonstrates using !secret:tofile to load an SSL certificate
# from a Kubernetes Secret and configure it as the LMI management certificate.
#
# Prerequisites:
# 1. Create a Kubernetes Secret with your P12 certificate:
#    kubectl create secret generic lmi-ssl-cfg \
#      --from-file=server.p12=/path/to/your/certificate.p12 \
#      --from-literal=p12-secret=YourP12Passw0rd \
#      --namespace=default
mgmt_base_url: https://ivia-config:9443
mgmt_user: admin
mgmt_old_pwd: admin
mgmt_pwd: Passw0rd
container:
  lmi_certificate:
    p12: !secret:tofile default/lmi-ssl-cfg:server.p12
    password: !secret default/lmi-ssl-cfg:p12-secret