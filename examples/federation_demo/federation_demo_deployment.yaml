### IVIA IDP Config ###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isva-idp-config
  labels:
    app: isva-idp-config
spec:
  selector:
    matchLabels:
      app: isva-idp-config
  replicas: 1 
  template: 
    metadata:
      labels:
        app: isva-idp-config
    spec:
      volumes:
        - name: isva-idp-configvol
          emptyDir: {}
      containers:
        - name: isva-idp-config
          image: icr.io/isva/verify-access:10.0.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9443
          volumeMounts:
            - mountPath: /var/shared
              name: isva-idp-configvol
          env:
            - name: SERVICE
              value: config
            - name: CONTAINER_TIMEZONE
              value: Australia/Brisbane
            - name: CONFIG_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: verify-access-operator
                  key: url
            - name: CONFIG_SERVICE_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: verify-access-operator
                  key: user
            - name: CONFIG_SERVICE_USER_PWD
              valueFrom:
                secretKeyRef:
                  name: verify-access-operator
                  key: rw.pwd
            - name: SNAPSHOT_ID
              value: idp-published
---
apiVersion: v1
kind: Service
metadata:
  name: isva-idp-config
  labels:
    app: isva-idp-config
spec:
  ports:
    - port: 9443
      name: isva-idp-config
      protocol: TCP
  selector:
    app: isva-idp-config
  type: NodePort
---
### IVIA IDP WRP ###
apiVersion: ibm.com/v1
kind: IBMSecurityVerifyAccess
metadata:
  annotations:
    deployment.kubernetes.io/revision: "1"
  labels:
