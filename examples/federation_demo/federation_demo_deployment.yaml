  name: isva-idp-webseal
spec:
  serviceAccountName: default
  image: icr.io/isva/verify-access-wrp:10.0.6.0
  snapshotId: idp-published
  instance: default
  language: en_US.utf8
  replicas: 1
---
apiVersion: v1
kind: Service
metadata:
  name: isva-idp-webseal
  labels:
    app: isva-idp-webseal
spec:
  ports:
    - port: 9443
      name: isva-idp-webseal
