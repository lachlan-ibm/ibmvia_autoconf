### ISVA Runtime ###
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivia-mmfa-runtime
  labels:
    app: ivia-mmfa-runtime
spec:
  selector:
    matchLabels:
      app: ivia-mmfa-runtime
  replicas: 1
  revisionHistoryLimit: 1
  template: 
    metadata:
      labels:
        app: ivia-mmfa-runtime
    spec:
      volumes:
        - name: ivia-mmfa-configvol
          emptyDir: {}
      containers:
        - name: ivia-mmfa-runtime
          image: icr.io/ivia/ivia-runtime:11.0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9443
          volumeMounts:
            - mountPath: /var/shared
              name: ivia-mmfa-configvol
          env:
            - name: SERVICE
              value: runtime
            - name: WLP_LOGGING_CONSOLE_FORMAT
              value: simple
            - name: CONTAINER_TIMEZONE
              value: Australia/Brisbane
            - name: CONFIG_SERVICE_URL
              value: https://ivia-mmfa-config:9443/shared_volume
            - name: CONFIG_SERVICE_TLS_CACERT
              value: disabled
            - name: CONFIG_SERVICE_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: configreader
                  key: username
            - name: CONFIG_SERVICE_USER_PWD
              valueFrom:
                secretKeyRef:
                  name: configreader
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: ivia-mmfa-runtime
  labels:
    app: ivia-mmfa-runtime
spec:
  ports:
    - port: 9443
      name: ivia-mmfa-runtime
      protocol: TCP
  selector:
    app: ivia-mmfa-runtime
  type: ClusterIP

