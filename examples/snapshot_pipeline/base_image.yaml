mgmt_user: admin
mgmt_pwd: admin
mgmt_ext_pwd: !environment OIDC_API_TOKEN
container:
  management_authorization:
    authorization_enforcement: True
    roles:
    - operation: "update"
      name: "Configuration Service"
      groups:
      - name: "cfgsvc"
        type: "local"
      features:
      - name: "shared_volume"
        access: "w"
    - operation: "update"
      name: "HVDB Admin"
      groups:
      - name: "dbadmin"
        type: "local"
      features:
      - name: "manage_database"
        access: "w"
    - operation: "update"
      name: "Full Write"
      groups:
      - name: "adminWrite"
        type: "local"
    - operation: "update"
      name: "Full Read"
      groups:
      - name: "adminGroup"
        type: "local"
  management_authentication:
    auth_type: "federation"
    oidc:
      client_id: !environment OIDC_CLIENT_ID
      client_secret: !environment OIDC_CLIENT_SECRET
      discovery_endpoint: !environment OIDC_WELL_KNOWN
      enable_pkce: true
  ssl_certificates:
  - name: "lmi_trust_store"
    signer_certificates:
    - !environment LDAP_PKI_DIR
    - !environment HVDB_PKI_DIR
  - name: "rt_profile_keys"
    signer_certificates:
    - !environment HVDB_PKI_DIR
  cluster:
    runtime_database:
      host: "postgresql"
      port: 5432
      type: "postgresql"
      user: "postgres"
      password: "Passw0rd"
      ssl: True
      db_name: "isva"
  activation: #Activation codes
    webseal: !environment IVIA_BASE_CODE
    access_control: !environment IVIA_AAC_CODE
    federation: !environment IVIA_FED_CODE
